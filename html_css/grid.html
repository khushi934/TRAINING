<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
    <style>
        #main{
            margin:0px;
            padding:0px;
            width:100%

        }
        .grid-box{ 
            display:grid;
            grid-template-columns: repeat(3,1fr);
            gap:10px;
            
        }
        .grid-boxes{
            background-image: url(https://static.vecteezy.com/system/resources/thumbnails/047/082/096/small/white-abstract-background-with-layer-abstract-shapes-vector.jpg);
            width:100%;
            height:100px;
        }
        @media(max-width:400px){
            .grid-box{
            
            
            display:grid;
            grid-template-columns: repeat(1,1fr);
            gap:10px;
            
        }}
        @media(min-width:700px){

            .grid-box{
            
            
            display:grid;
            grid-template-columns: repeat(2,1fr);
            gap:10px;
            
        }
        }
        @media(min-width:1000px){
            .grid-box{
            
            
            display:grid;
            grid-template-columns: repeat(3,1fr);
            gap:10px;
            
        }

        
        }
    </style>
</head>
<body>
    <div id="main">
        <div class="grid-box">
            <div class="grid-boxes">1</div>
            <div class="grid-boxes">2</div>
            <div class="grid-boxes">3</div>
            <div class="grid-boxes">4</div>
            <div class="grid-boxes">5</div>
            <div class="grid-boxes">6</div>
            <div class="grid-boxes">7</div>
            <div class="grid-boxes">8</div>
            
        </div>
    </div>
</body>
</html>
